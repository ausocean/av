<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Dual Homography Sync (Large)</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: black;
        }

        canvas {
            display: block;
        }
    </style>
</head>

<body>
    <canvas id="clockCanvas"></canvas>

    <script>
        const canvas = document.getElementById('clockCanvas');
        const ctx = canvas.getContext('2d');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        let startTime = null;
        const rotationTimeMs = 1000;

        // --- MASSIVELY SCALED UP VARIABLES ---
        const radius = 300;       // Much wider orbit for the white dot
        const markerSize = 60;    // Larger corners for the cameras to lock onto
        const boxHalf = 400;      // Makes the green box 800x800 pixels

        function draw(timestamp) {
            if (!startTime) startTime = timestamp;
            const elapsed = timestamp - startTime;

            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const cx = canvas.width / 2;
            const cy = canvas.height / 2;

            // --- 1. THE LARGE GREEN CLOCK BOX ---
            ctx.fillStyle = '#00FF00'; // Pure Green
            ctx.fillRect(cx - boxHalf, cy - boxHalf, markerSize, markerSize);
            ctx.fillRect(cx + boxHalf - markerSize, cy - boxHalf, markerSize, markerSize);
            ctx.fillRect(cx + boxHalf - markerSize, cy + boxHalf - markerSize, markerSize, markerSize);
            ctx.fillRect(cx - boxHalf, cy + boxHalf - markerSize, markerSize, markerSize);

            // The Clock
            const progress = (elapsed % rotationTimeMs) / rotationTimeMs;
            const angle = (progress * 2 * Math.PI) - (Math.PI / 2);
            const dotX = cx + Math.cos(angle) * radius;
            const dotY = cy + Math.sin(angle) * radius;

            // Spinning white dot (larger)
            ctx.beginPath();
            ctx.arc(dotX, dotY, 40, 0, 2 * Math.PI);
            ctx.fillStyle = 'white';
            ctx.fill();

            // Stationary RED center anchor (larger)
            ctx.beginPath();
            ctx.arc(cx, cy, 25, 0, 2 * Math.PI);
            ctx.fillStyle = 'red';
            ctx.fill();

            // --- 2. THE LARGE BLUE TEXT BOX ---
            // Scaled up to 800x260 pixels
            const tx = 50, ty = 50, tw = 800, th = 260;
            ctx.fillStyle = '#0000FF'; // Pure Blue
            ctx.fillRect(tx, ty, markerSize, markerSize);
            ctx.fillRect(tx + tw - markerSize, ty, markerSize, markerSize);
            ctx.fillRect(tx + tw - markerSize, ty + th - markerSize, markerSize, markerSize);
            ctx.fillRect(tx, ty + th - markerSize, markerSize, markerSize);

            // The Text
            ctx.fillStyle = 'white';
            ctx.font = '55px monospace';
            ctx.fillText(`Time: ${(elapsed / 1000).toFixed(3)} s`, tx + 80, ty + 100);

            const macroTick = Math.floor(elapsed / (1000 / 24));
            ctx.font = 'bold 100px monospace';
            ctx.fillText(`Frame: ${macroTick}`, tx + 80, ty + 210);

            requestAnimationFrame(draw);
        }

        requestAnimationFrame(draw);
    </script>
</body>

</html>
